version: '3.8'

services:
  jarvis-openclaw:
    image: openclaw/openclaw:latest
    container_name: jarvis-openclaw
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Dados internos do OpenClaw (caminhos relativos, ou seja, se mover a pasta eles vão junto funcionado perfeitamente)
      - ./data:/workspace/data
      - ./skills:/skills

      # Bind absoluto do Cérebro Local (O OpenClaw enxerga seu computador inteiro como /host_machine)
      # Essa montagem é cega para a pasta Library do Mac devido a permissões de OS, então suas senhas do SO estão seguras.
      - /Users/severinobione:/host_machine
    ports:
      # Oculta a porta do mundo externo para segurança (só roda no seu localhost)
      - "127.0.0.1:18789:18789"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:18789/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
