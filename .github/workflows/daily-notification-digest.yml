name: Daily Notification Digest

on:
  schedule:
    # Every day at 09:00 UTC (06:00 Brasilia)
    - cron: '0 9 * * *'
  
  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      digest_type:
        description: 'Type of digest to send'
        required: false
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly

jobs:
  send-digest:
    runs-on: ubuntu-latest
    
    steps:
      - name: Send Daily Notification Digest
        run: |
          echo "Starting Notification Digest processing..."
          echo "Digest Type: ${{ github.event.inputs.digest_type || 'daily' }}"
          
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/send-notification-digest" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"type": "${{ github.event.inputs.digest_type || 'daily' }}"}')
          
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          
          echo "HTTP Status: $http_code"
          echo "Response: $body"
          
          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            echo "✅ Notification digest sent successfully"
            exit 0
          else
            echo "❌ Notification digest failed with status $http_code"
            exit 1
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

  aggregate-metrics:
    runs-on: ubuntu-latest
    
    steps:
      - name: Aggregate Consultant Metrics
        run: |
          echo "Starting Consultant Metrics aggregation..."
          
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/aggregate-consultant-metrics" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{}')
          
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          
          echo "HTTP Status: $http_code"
          echo "Response: $body"
          
          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            echo "✅ Metrics aggregation completed successfully"
            exit 0
          else
            echo "❌ Metrics aggregation failed with status $http_code"
            exit 1
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
